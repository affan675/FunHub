<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desk Pet Simulator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

    :root {
      --cyan: #00e5ff;
      --yellow: #ffeb3b;
      --orange: #ff5722;
      --red: #ff0000;
      --grey: #555555;
      --blob-color: var(--cyan);
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: radial-gradient(circle, #2a2a35 0%, #15151c 100%);
      background-size: 20px 20px;
      background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
      font-family: 'VT323', monospace;
      color: white;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* DRAGGABLE WIDGET CONTAINER */
    #pet-container {
      position: absolute;
      width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: grab;
    }
    
    #pet-container:active {
      cursor: grabbing;
    }

    /* BLOB */
    .blob-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    #blob {
      width: 100px;
      height: 100px;
      background: radial-gradient(circle at 30% 30%, #ffffff 0%, var(--blob-color) 40%, #000000 130%);
      border-radius: 50%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      animation: float 3s ease-in-out infinite;
      transition: background 0.5s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
    }

    #blob:hover {
      animation: wobble 0.5s infinite;
    }

    #blob.blink {
      animation: float 3s ease-in-out infinite, blink 0.5s infinite alternate;
    }
    
    #blob.dead {
      animation: none;
      transform: scale(1) translateY(30px);
      border-radius: 50% 50% 20% 20%;
    }

    /* EMOJI & CROWN */
    #mood-emoji {
      position: absolute;
      top: -25px;
      font-size: 24px;
      animation: float 3s ease-in-out infinite 0.1s;
      pointer-events: none;
      z-index: 10;
    }

    /* SPEECH BUBBLE */
    #speech-bubble {
      position: absolute;
      left: 110%;
      top: -10px;
      width: max-content;
      max-width: 180px;
      background: white;
      color: black;
      padding: 10px 15px;
      border-radius: 8px;
      font-family: 'Press Start 2P', cursive;
      font-size: 10px;
      line-height: 1.4;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 20;
    }

    #speech-bubble::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -10px;
      transform: translateY(-50%);
      border-width: 5px 10px 5px 0;
      border-style: solid;
      border-color: transparent white transparent transparent;
    }

    #speech-bubble.visible {
      opacity: 1;
    }

    /* UI PANELS */
    .ui-panel {
      width: 100%;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
    }

    .bar-container {
      margin-bottom: 10px;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .bar-track {
      width: 100%;
      height: 12px;
      background: #222;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #444;
    }

    .bar-fill {
      height: 100%;
      transition: width 0.3s ease, background 0.3s ease;
    }

    #hunger-fill { background: linear-gradient(90deg, #ff0000, #4caf50); }
    #happy-fill { background: linear-gradient(90deg, #2196f3, #ffc107); }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #aaa;
      margin-top: 10px;
      border-top: 1px dashed #444;
      padding-top: 8px;
    }

    /* DEATH SCREEN */
    #death-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      backdrop-filter: blur(5px);
    }

    #death-screen h1 {
      font-family: 'Press Start 2P', cursive;
      color: var(--red);
      font-size: 24px;
      text-align: center;
      line-height: 1.5;
    }

    #restart-btn {
      margin-top: 30px;
      padding: 15px 30px;
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      background: #fff;
      color: #000;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.2s;
    }

    #restart-btn:hover {
      background: var(--red);
      color: white;
    }

    /* ANIMATIONS */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    @keyframes wobble {
      0% { transform: rotate(0deg) scale(1.05); }
      25% { transform: rotate(-10deg) scale(1.05); }
      50% { transform: rotate(0deg) scale(1.05); }
      75% { transform: rotate(10deg) scale(1.05); }
      100% { transform: rotate(0deg) scale(1.05); }
    }

    @keyframes blink {
      from { opacity: 1; }
      to { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <div id="pet-container">
    <div class="blob-wrapper">
      <div id="mood-emoji">😁</div>
      <div id="blob"></div>
      <div id="speech-bubble"></div>
    </div>

    <div class="ui-panel">
      <div class="bar-container">
        <div class="bar-label"><span>Hunger</span><span id="hunger-val">80%</span></div>
        <div class="bar-track">
          <div id="hunger-fill" class="bar-fill" style="width: 80%;"></div>
        </div>
      </div>
      <div class="bar-container">
        <div class="bar-label"><span>Happiness</span><span id="happy-val">80%</span></div>
        <div class="bar-track">
          <div id="happy-fill" class="bar-fill" style="width: 80%;"></div>
        </div>
      </div>
      <div class="stats">
        <span id="age-stat">Alive: 0m</span>
        <span id="feed-stat">Fed: 0x</span>
      </div>
    </div>
  </div>

  <div id="death-screen">
    <h1>🪦 RIP Warden.<br><br>You Monster.</h1>
    <button id="restart-btn">Resurrect (Restart)</button>
  </div>

  <script>
    // System Architecture: Layer 1 - Data Layer
    const DEFAULT_STATE = {
      hunger: 80,
      happiness: 80,
      size: 1.0,
      ageMinutes: 0,
      feeds: 0,
      isDead: false,
      lastSaved: Date.now()
    };

    let state = { ...DEFAULT_STATE };
    let timers = {};
    let isTyping = false; // Spam protection flag
    let lastClickTime = 0;

    const nags = [
      "You fed me 2 hours ago. I counted.",
      "Left me. Just like JNV hostel mess.",
      "I see you coding. No time for me, huh?",
      "My ancestors were tamagotchis. They died alone.",
      "Click me. Now. Or I'll delete your localStorage."
    ];

    // DOM Elements
    const root = document.documentElement;
    const blob = document.getElementById('blob');
    const moodEmoji = document.getElementById('mood-emoji');
    const speechBubble = document.getElementById('speech-bubble');
    const hungerFill = document.getElementById('hunger-fill');
    const happyFill = document.getElementById('happy-fill');
    const hungerVal = document.getElementById('hunger-val');
    const happyVal = document.getElementById('happy-val');
    const ageStat = document.getElementById('age-stat');
    const feedStat = document.getElementById('feed-stat');
    const deathScreen = document.getElementById('death-screen');
    const container = document.getElementById('pet-container');

    // System Architecture: Layer 2 - Engine
    function init() {
      loadState();
      updateUI();
      if (state.isDead) {
        die();
      } else {
        startLoops();
      }
    }

    function loadState() {
      const saved = localStorage.getItem('warden_state');
      if (saved) {
        state = JSON.parse(saved);
        
        if (!state.isDead) {
          const now = Date.now();
          const timeDiff = now - state.lastSaved;
          
          // Calculate offline penalties
          const missedDecays = Math.floor(timeDiff / 3000); // 1 hunger per 3 seconds
          const missedMinutes = Math.floor(timeDiff / 60000); // age in minutes
          
          state.hunger = Math.max(0, state.hunger - missedDecays);
          state.happiness = state.hunger; // Happiness mirrors hunger closely
          state.ageMinutes += missedMinutes;
          
          if (state.hunger <= 0) state.isDead = true;
        }
      }
    }

    function saveState() {
      state.lastSaved = Date.now();
      localStorage.setItem('warden_state', JSON.stringify(state));
    }

    function startLoops() {
      // Hunger decay (1 every 3 seconds)
      timers.decay = setInterval(() => {
        state.hunger = Math.max(0, state.hunger - 1);
        state.happiness = state.hunger; 
        updateUI();
        if (state.hunger <= 0) die();
      }, 3000);

      // Age increment (every 60 seconds)
      timers.age = setInterval(() => {
        state.ageMinutes += 1;
        updateUI();
      }, 60000);

      // Nag trigger (every 30 seconds if hungry)
      timers.nag = setInterval(() => {
        if (state.hunger < 40 && state.hunger > 0 && !isTyping) {
          showNag(nags[Math.floor(Math.random() * nags.length)]);
        }
      }, 30000);

      // Auto-save (every 10 seconds)
      timers.save = setInterval(saveState, 10000);
    }

    function clearLoops() {
      Object.values(timers).forEach(clearInterval);
    }

    function typeWriter(text, cb) {
      isTyping = true;
      speechBubble.innerHTML = '';
      speechBubble.classList.add('visible');
      
      let i = 0;
      const interval = setInterval(() => {
        speechBubble.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) {
          clearInterval(interval);
          setTimeout(() => {
            speechBubble.classList.remove('visible');
            isTyping = false;
            if(cb) cb();
          }, 4000); // Stays for 4 seconds
        }
      }, 50); // Typing speed
    }

    function showNag(message) {
      if (isTyping) return;
      typeWriter(message);
    }

    function feed() {
      if (state.isDead) return;
      
      // Spam protection (debounce logic)
      const now = Date.now();
      if (now - lastClickTime < 250) {
        showNag("Stop. That hurts.");
        return;
      }
      lastClickTime = now;

      // Update state
      state.hunger = Math.min(100, state.hunger + 15);
      state.happiness = state.hunger;
      state.size = Math.min(2.5, state.size + 0.05);
      state.feeds += 1;
      
      // Blob Pop / Wobble is handled by CSS :active/:hover, 
      // but we force a quick scale pulse here
      blob.style.transform = `scale(${state.size + 0.1})`;
      setTimeout(() => {
        blob.style.transform = `scale(${state.size})`;
      }, 150);

      updateUI();
      saveState();
    }

    function die() {
      state.isDead = true;
      state.hunger = 0;
      state.happiness = 0;
      clearLoops();
      saveState();
      
      blob.classList.add('dead');
      blob.classList.remove('blink');
      root.style.setProperty('--blob-color', 'var(--grey)');
      moodEmoji.innerText = '☠️';
      
      setTimeout(() => {
        deathScreen.style.display = 'flex';
      }, 1000);
      
      updateUI();
    }

    function restart() {
      state = { ...DEFAULT_STATE, lastSaved: Date.now() };
      blob.classList.remove('dead');
      deathScreen.style.display = 'none';
      saveState();
      startLoops();
      updateUI();
    }

    // System Architecture: Layer 3 - Display Layer
    function updateUI() {
      // Update Bars & Texts
      hungerFill.style.width = `${state.hunger}%`;
      happyFill.style.width = `${state.happiness}%`;
      hungerVal.innerText = `${state.hunger}%`;
      happyVal.innerText = `${state.happiness}%`;
      ageStat.innerText = `Alive: ${state.ageMinutes}m`;
      feedStat.innerText = `Fed: ${state.feeds}x`;

      if (state.isDead) return;

      // Size & Evolution
      blob.style.transform = `scale(${state.size})`;
      let evolutionEmoji = state.size >= 2.0 ? ' 👑' : '';

      // Mood Mapping & Threshold Zones
      blob.classList.remove('blink');
      if (state.hunger > 70) {
        root.style.setProperty('--blob-color', 'var(--cyan)');
        moodEmoji.innerText = '😁' + evolutionEmoji;
      } else if (state.hunger > 40) {
        root.style.setProperty('--blob-color', 'var(--yellow)');
        moodEmoji.innerText = '😐' + evolutionEmoji;
      } else if (state.hunger > 20) {
        root.style.setProperty('--blob-color', 'var(--orange)');
        moodEmoji.innerText = '😠' + evolutionEmoji;
      } else {
        root.style.setProperty('--blob-color', 'var(--red)');
        moodEmoji.innerText = '💀' + evolutionEmoji;
        blob.classList.add('blink');
      }
    }

    // Event Listeners
    blob.addEventListener('click', feed);
    document.getElementById('restart-btn').addEventListener('click', restart);

    // Desktop Widget Drag Logic (Optional Add-on)
    let isDragging = false;
    let offsetX = 0, offsetY = 0;

    container.addEventListener('mousedown', (e) => {
      if(e.target === blob || state.isDead) return; // Allow clicking blob separately
      isDragging = true;
      offsetX = e.clientX - container.offsetLeft;
      offsetY = e.clientY - container.offsetTop;
      container.style.cursor = 'grabbing';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      container.style.left = `${e.clientX - offsetX}px`;
      container.style.top = `${e.clientY - offsetY}px`;
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      container.style.cursor = 'grab';
    });

    // Boot up
    init();

  </script>
</body>
</html>
